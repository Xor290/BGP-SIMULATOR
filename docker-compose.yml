services:
  api:
    build:
      context: ./api
    ports:
      - "8080:8080"
    environment:
      ENV: development
      PORT: 8080
      SESSION_SECRET: secret
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: bgp
      DB_PASSWORD: bgp
      DB_NAME: bgp_manager
      DB_SSLMODE: disable
      USER_JWT_SECRET: supersecretjwt
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ansible:/app/ansible
    networks:
      - mgmt
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bgp
      POSTGRES_PASSWORD: bgp
      POSTGRES_DB: bgp_manager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mgmt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgp -d bgp_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  frr-as65001:
    build:
      context: ./docker/frr
    container_name: frr-as65001
    privileged: true
    volumes:
      - frr_as65001_config:/etc/frr
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    networks:
      mgmt:
      bgp-fabric:
        ipv4_address: 10.0.0.11

  frr-as65002:
    build:
      context: ./docker/frr
    container_name: frr-as65002
    privileged: true
    volumes:
      - frr_as65002_config:/etc/frr
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    networks:
      mgmt:
      bgp-fabric:
        ipv4_address: 10.0.0.12

networks:
  mgmt:
    driver: bridge
  bgp-fabric:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24

volumes:
  postgres_data:
  frr_as65001_config:
  frr_as65002_config:
