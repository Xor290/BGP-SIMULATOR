name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: api

        steps:
            - uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: api/go.mod

            - name: Download dependencies
              run: go mod download

            - name: Build
              run: go build ./...

            - name: Vet
              run: go vet ./...

            - name: Test
              run: go test ./...
    integration:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - uses: actions/checkout@v4

            - name: Start stack
              run: docker compose up -d --build

            - name: Wait for API
              run: |
                  for i in $(seq 1 20); do
                      HEALTH=$(curl -sf http://localhost:8080/api/v1/health)
                      if [ $? -eq 0 ]; then
                          echo "API up: $HEALTH"
                          break
                      fi
                      echo "Waiting for API... ($i/20)"
                      sleep 3
                  done

            - name: Run integration tests
              run: |
                  chmod +x test_routes.sh
                  ./test_routes.sh

            - name: Show logs on failure
              if: failure()
              run: docker compose logs

            - name: Teardown
              if: always()
              run: docker compose down -v
